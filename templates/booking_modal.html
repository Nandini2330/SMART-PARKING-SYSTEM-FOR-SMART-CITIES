<div class="modal fade" id="bookingModal" tabindex="-1" aria-labelledby="bookingModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="bookingModalLabel">Book Parking Slot</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="bookingForm">
      <div class="modal-body">
          <input type="hidden" id="bookSlotId" name="slot_id" />
          <div class="mb-3">
            <label class="form-label">Vehicle Number</label>
            <input type="text" class="form-control" id="vehicleNumber" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Owner Name</label>
            <input type="text" class="form-control" id="ownerName" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" id="phoneNumber" required />
          </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-primary">Book Slot</button>
      </div>
      </form>
    </div>
  </div>
</div>
